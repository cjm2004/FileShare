<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件分享</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  color:#fff
}
#pageBg{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;background-attachment:fixed}
body.has-bg{background:none}

/* ── Container ── */
.share-container{
  max-width:820px;margin:0 auto;padding:28px 16px 40px;
}
.header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px
}
.header .logo{font-size:20px;font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
.header .back{color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;transition:color .2s}
.header .back:hover{color:rgba(255,255,255,0.8)}

/* ── Error Box ── */
.error-box{text-align:center;padding:60px 20px}
.error-box .error-icon{font-size:64px;margin-bottom:16px}
.error-box .error-text{font-size:18px;color:rgba(255,255,255,0.8);margin-bottom:20px}
.error-box .back-link{display:inline-block;padding:10px 24px;border-radius:10px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);text-decoration:none;font-size:14px;transition:all .2s}
.error-box .back-link:hover{background:rgba(255,255,255,0.15);color:#fff}

/* ── Hints ── */
.hint-box{
  background:rgba(255,255,255,0.10);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:14px 18px;margin-bottom:14px;font-size:14px;line-height:1.7;word-wrap:break-word;color:rgba(255,255,255,0.85)
}
.hint-box h1,.hint-box h2,.hint-box h3,.hint-box h4{color:#fff;margin:8px 0 4px}
.hint-box h1{font-size:19px}
.hint-box h2{font-size:16px}
.hint-box p{margin:4px 0}
.hint-box a{color:#a3bffa;text-decoration:underline}
.hint-box ul,.hint-box ol{padding-left:18px;margin:4px 0}
.hint-box code{background:rgba(0,0,0,0.2);padding:1px 5px;border-radius:3px;font-size:13px}
.hint-box pre{background:rgba(0,0,0,0.25);padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0}
.hint-box hr{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:10px 0}
.hint-box table{border-collapse:collapse;width:100%;margin:6px 0}
.hint-box th,.hint-box td{border:1px solid rgba(255,255,255,0.12);padding:5px 8px;text-align:left}
.hint-box th{background:rgba(255,255,255,0.06)}

/* ── Extract Code ── */
.code-section{max-width:460px;margin:0 auto 24px}
.code-box{
  background:rgba(255,255,255,0.13);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.22);border-radius:18px;
  padding:28px 24px;text-align:center
}
.code-box h2{font-size:17px;margin-bottom:16px}
.code-input-wrap{display:flex;gap:10px;margin-bottom:10px}
.code-input-wrap input{
  flex:1;padding:11px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:10px;
  background:rgba(255,255,255,0.10);color:#fff;font-size:16px;text-align:center;
  letter-spacing:3px;outline:none;transition:all .3s
}
.code-input-wrap input:focus{border-color:rgba(255,255,255,0.6)}
.code-input-wrap input::placeholder{color:rgba(255,255,255,0.4);letter-spacing:0}

/* ── Toolbar ── */
.toolbar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-bottom:14px;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);border-radius:12px;
  padding:10px 14px;
}
.toolbar .count{font-size:13px;color:rgba(255,255,255,0.6);flex:1}

.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;text-decoration:none;color:#fff;line-height:1.4
}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,#1565c0,#0d47a1)}
.btn-primary:hover{box-shadow:0 4px 14px rgba(25,118,210,0.35)}
.btn-green{background:rgba(25,118,210,0.20);color:#90caf9;border:1px solid rgba(25,118,210,0.25)}
.btn-green:hover{background:rgba(25,118,210,0.30)}
.btn-ghost{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
.btn-ghost:hover{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)}
.btn-small{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.4;cursor:default;transform:none}

/* ── Breadcrumb ── */
.breadcrumb{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  padding:8px 14px;margin-bottom:10px;
  font-size:13px;color:rgba(255,255,255,0.5)
}
.breadcrumb .sep{color:rgba(255,255,255,0.2)}
.breadcrumb a{
  color:rgba(255,255,255,0.6);text-decoration:none;cursor:pointer;transition:color .2s;
  padding:2px 6px;border-radius:4px
}
.breadcrumb a:hover{color:#fff;background:rgba(255,255,255,0.08)}
.breadcrumb .current{color:rgba(255,255,255,0.9);padding:2px 6px}

/* ── File/Folder List ── */
.file-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}

.file-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;
  padding:8px 12px;
  transition:all .2s;cursor:pointer
}
.file-row:hover{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.15)}
.file-row.selected{background:rgba(25,118,210,0.15);border-color:rgba(25,118,210,0.35)}
.file-row .cb{
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-radius:4px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .2s;cursor:pointer;background:transparent;color:transparent;font-size:11px
}
.file-row .cb.checked{background:#1976d2;border-color:#1976d2;color:#fff}
.file-row .icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.file-row .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.file-row .meta{font-size:12px;color:rgba(255,255,255,0.35);flex-shrink:0;text-align:right;min-width:70px}

.check-all-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 12px;margin-bottom:2px;
  font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;
  border-radius:8px;transition:background .2s
}
.check-all-row:hover{background:rgba(255,255,255,0.04)}
.check-all-row .cb{width:18px;height:18px;border:2px solid rgba(255,255,255,0.25);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;color:transparent;font-size:11px}
.check-all-row .cb.checked{background:#1976d2;border-color:#1976d2;color:#fff}

/* ── Empty state ── */
.empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.4);font-size:14px}
.empty-state .icon{font-size:48px;margin-bottom:10px}

/* ── Bottom Download Bar ── */
.bottom-bar{
  position:sticky;bottom:0;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:rgba(25,118,210,0.20);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(25,118,210,0.25);
  border-radius:14px;
  padding:12px 18px;
  margin-top:10px;
  animation:fadeIn .25s ease;
  z-index:10
}
.bottom-bar .bar-count{color:rgba(255,255,255,0.85);font-size:14px;font-weight:500}
.bottom-bar .btn{padding:10px 20px;font-size:14px}

/* ── Selection Count ── */
.sel-count{
  text-align:center;padding:10px 0 6px;
  font-size:13px;color:rgba(255,255,255,0.5)
}

/* ── Progress overlay ── */
.progress-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center
}
.progress-overlay.show{display:flex}
.progress-box{
  background:rgba(13,30,60,0.88);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:18px;padding:28px 24px;
  width:90%;max-width:360px;text-align:center;color:#fff
}
.progress-box h3{font-size:15px;margin-bottom:4px;color:#fff}
.progress-box .progress-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:14px}
.progress-bar-wrap{width:100%;height:6px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin-bottom:10px}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#1976d2,#64b5f6);border-radius:3px;transition:width .2s}
.progress-bar.indeterminate{width:30% !important;animation:progressPulse 1.5s ease-in-out infinite}
@keyframes progressPulse{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(430%)}
}
.progress-stats{display:flex;justify-content:center;gap:20px;font-size:13px;color:rgba(255,255,255,0.65)}
.progress-stats span{white-space:nowrap}
.progress-tip{font-size:12px;color:rgba(255,255,255,0.45);margin-top:6px}
.progress-cancel{
  margin-top:16px;width:100%;padding:10px 20px;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.12);border-radius:10px;
  color:rgba(255,255,255,0.65);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s
}
.progress-cancel:hover{
  background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.9)
}

/* ── Preview Modal ── */
.preview-overlay{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;padding:20px
}
.preview-overlay.show{display:flex}
.preview-box{
  background:#fff;border-radius:16px;width:100%;max-width:800px;
  max-height:90vh;overflow:auto;position:relative;color:#1a202c
}
.preview-box .preview-head{
  position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid #e2e8f0;z-index:2
}
.preview-box .preview-head h3{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.preview-box .preview-head .close{
  cursor:pointer;color:#a0aec0;font-size:20px;line-height:1;transition:color .2s;background:none;border:none;padding:4px
}
.preview-box .preview-head .close:hover{color:#718096}
.preview-body{padding:16px 18px}

.preview-body img{max-width:100%;border-radius:8px;display:block;margin:0 auto}
.preview-body video{max-width:100%;max-height:70vh;border-radius:8px;display:block;margin:0 auto;background:#000}

.text-preview{
  background:rgba(0,0,0,0.06);border-radius:8px;padding:14px;max-height:60vh;overflow:auto;
  font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:13px;
  line-height:1.6;white-space:pre-wrap;word-wrap:break-word;color:#2d3748;
  border:1px solid rgba(0,0,0,0.08)
}
.code-preview{
  background:#1a1d2e;border-radius:8px;padding:16px 18px;max-height:65vh;overflow:auto;
  font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:13px;
  line-height:1.65;white-space:pre-wrap;word-wrap:break-word;color:#e2e8f0;
  border:1px solid rgba(255,255,255,0.08);margin:0
}
.code-preview code{font-family:inherit;font-size:inherit;color:inherit}
.md-preview{line-height:1.8;color:#2d3748;padding:4px 0;max-height:65vh;overflow:auto}
.md-preview h1,.md-preview h2,.md-preview h3{margin:12px 0 6px;color:#1a202c}
.md-preview h1{font-size:20px;border-bottom:1px solid #e2e8f0;padding-bottom:6px}
.md-preview h2{font-size:17px}
.md-preview h3{font-size:15px}
.md-preview p{margin:6px 0}
.md-preview a{color:#64b5f6}
.md-preview code{background:#edf2f7;padding:1px 5px;border-radius:3px;font-size:13px}
.md-preview pre{background:#edf2f7;padding:12px;border-radius:8px;overflow-x:auto}
.md-preview pre code{background:none;padding:0}
.md-preview ul,.md-preview ol{padding-left:20px;margin:6px 0}
.md-preview img{max-width:100%;border-radius:6px}
.md-preview blockquote{border-left:3px solid #e2e8f0;padding-left:12px;margin:8px 0;color:#718096}
.md-preview table{border-collapse:collapse;width:100%;margin:8px 0}
.md-preview th,.md-preview td{border:1px solid #e2e8f0;padding:5px 10px;text-align:left}
.md-preview th{background:#f7f9fc}
.md-preview hr{border:none;border-top:1px solid #e2e8f0;margin:12px 0}
.md-preview .file-hint{font-size:12px;color:#a0aec0;margin-top:8px}

/* ── Footer ── */
.share-footer{text-align:center;color:rgba(255,255,255,0.35);font-size:12px;margin-top:28px;padding:8px}

/* ── Toast ── */
.toast-container{position:fixed;top:16px;right:16px;z-index:99999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);backdrop-filter:blur(10px);
  animation:slideIn .25s ease,fadeOut .3s ease 2.5s forwards;max-width:300px
}
.toast-success{background:rgba(25,118,210,0.85)}
.toast-error{background:rgba(229,62,62,0.85)}
.toast-warning{background:rgba(214,158,46,0.85)}
.toast-info{background:rgba(49,130,206,0.85)}

@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(40px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Loading ── */
.loading-overlay{
  position:fixed;inset:0;z-index:9997;background:rgba(0,0,0,0.3);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px
}
.loading-overlay.show{display:flex}
.loading-overlay .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}

/* ── Notification Overlay ── */
.notify-overlay{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center
}
.notify-overlay.show{display:flex}
.notify-box{
  background:rgba(13,30,60,0.88);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:18px;padding:32px 28px 20px;
  width:90%;max-width:380px;text-align:center;color:#fff
}
.notify-box h3{
  font-size:17px;font-weight:700;margin-bottom:10px;color:#fff
}
.notify-box .notify-content{
  font-size:14px;line-height:1.6;color:rgba(255,255,255,0.78);margin-bottom:20px
}
.notify-box .notify-content p{margin:6px 0}
.notify-close{
  margin:0 auto;display:block;
  padding:9px 28px;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.12);border-radius:10px;
  color:rgba(255,255,255,0.65);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
  opacity:0.4;pointer-events:none
}
.notify-close.active{
  opacity:1;pointer-events:auto
}
.notify-close.active:hover{
  background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.9)
}
.notify-countdown{
  font-size:12px;color:rgba(255,255,255,0.35);margin-top:8px
}

/* ── Responsive ── */
@media(max-width:600px){
  .share-container{padding:16px 10px}
  .file-row{padding:7px 10px;flex-wrap:wrap}
  .bottom-bar{flex-direction:column;text-align:center}
  .preview-box{margin:10px;max-width:100%}
}

/* ── Captcha Overlay (glass, same style as index) ── */
.captcha-overlay{
  position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center
}
.captcha-overlay.show{display:flex}
.captcha-modal{
  background:rgba(255,255,255,0.92);backdrop-filter:blur(24px);
  border-radius:16px;padding:28px 30px;width:90%;max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center
}
.captcha-modal .captcha-title{color:#1a202c;font-size:15px;font-weight:700;margin-bottom:2px}
.captcha-modal .captcha-desc{color:#a0aec0;font-size:12px;margin-bottom:16px}
.captcha-image-wrap{
  background:rgba(255,255,255,0.95);border:2px solid #e2e8f0;
  border-radius:10px;padding:10px;margin-bottom:14px;display:flex;align-items:center;justify-content:center
}
.captcha-image-wrap svg{display:block;max-width:100%}
.captcha-input-row{
  display:flex;gap:8px;margin-bottom:10px;align-items:center
}
.captcha-input-row input{
  flex:1;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;
  font-size:15px;outline:none;background:#fff;color:#2d3748;transition:border-color .2s
}
.captcha-input-row input:focus{border-color:#1976d2}
.captcha-input-row input::placeholder{color:#cbd5e0;letter-spacing:0}
.captcha-input-row button{
  width:42px;height:42px;border-radius:10px;border:2px solid #e2e8f0;
  background:#fff;color:#4a5568;font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.captcha-input-row button:hover{background:#edf2f7;border-color:#1976d2}
.captcha-submit{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#1976d2,#1565c0);color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s
}
.captcha-submit:hover{opacity:.9}
.captcha-submit.loading{opacity:.5;cursor:default;pointer-events:none}
.captcha-error{color:#e53e3e;font-size:12px;margin-top:8px;min-height:18px}
</style>
</head>
<body>
<div class="page-bg" id="pageBg"></div>

<div class="share-container" id="app">
  <div class="header">
    <div class="logo" id="siteName">📁 文件分享</div>
    <a class="back" href="/">← 返回首页</a>
  </div>

  <div class="hint-box" id="topHint" style="display:none"></div>
  <div class="hint-box" id="announcementBox" style="display:none"></div>

  <!-- Error Message (expired / deleted) -->
  <div class="error-box" id="errorMessage" style="display:none">
    <div class="error-icon">⚠️</div>
    <div class="error-text" id="errorText"></div>
    <a class="back-link" href="/">← 返回首页</a>
  </div>

  <!-- Extract Code -->
  <div class="code-section" id="codeSection" style="display:none;margin:0 auto 24px">
    <div class="code-box">
      <h2>🔑 请输入提取码</h2>
      <div class="code-input-wrap">
        <input type="text" id="extractCodeInput" placeholder="输入提取码" maxlength="20" autocomplete="off">
        <button class="btn btn-primary" onclick="verifyCode()" id="verifyBtn">验证</button>
      </div>
      <div id="codeError" style="color:#fc8181;font-size:13px;display:none"></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="contentArea" style="display:none">

    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- File List -->
    <div class="file-list" id="fileList"></div>

    <!-- Nothing here -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">📂</div>
      <p>此文件夹为空</p>
    </div>

    <!-- Selection Count -->
    <div class="sel-count" id="selCountRow">已选择 0 项</div>

    <!-- Bottom Download Bar -->
    <div class="bottom-bar" id="bottomBar">
      <button class="btn btn-primary" onclick="downloadSelected()" id="bottomDownloadBtn">⬇️ 下载</button>
    </div>
  </div>

  <div class="share-footer" id="shareFooter"></div>
</div>

<!-- Progress overlay -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <h3 id="progressTitle">📦 正在打包...</h3>
    <div class="progress-sub" id="progressSub"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar indeterminate" id="progressBar"></div>
    </div>
    <div class="progress-stats">
      <span id="progressSpeed">--</span>
      <span id="progressTime">已用时 --</span>
    </div>
    <div class="progress-tip" id="progressTip"></div>
    <button class="progress-cancel" onclick="cancelDownload()">取消下载</button>
  </div>
</div>

<!-- Preview overlay -->
<div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePreview()">
  <div class="preview-box" id="previewBox">
    <div class="preview-head">
      <h3 id="previewTitle">预览</h3>
      <button class="close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="text-preview" id="previewContent" style="display:none"></div>
      <div class="md-preview" id="previewMd" style="display:none"></div>
      <img id="previewImage" style="display:none">
      <video id="previewVideo" controls style="display:none" playsinline></video>
    </div>
  </div>
</div>

<!-- Captcha overlay -->
<div class="captcha-overlay" id="captchaOverlay" onclick="if(event.target===this)closeCaptcha()">
  <div class="captcha-modal">
    <div class="captcha-title">🔒 验证码</div>
    <div class="captcha-desc">请输入图中验证码</div>
    <div class="captcha-image-wrap" id="captchaImageWrap">
      <img id="captchaImage" src="" alt="captcha" style="display:none">
    </div>
    <div class="captcha-input-row">
      <input type="text" id="captchaInput" placeholder="输入验证码" maxlength="8"
        onkeydown="if(event.key==='Enter') submitCaptcha()">
      <button id="captchaRefreshBtn" onclick="loadCaptcha()" title="换一张">↻</button>
    </div>
    <button class="captcha-submit" id="captchaSubmitBtn" onclick="submitCaptcha()">✓ 确认</button>
    <div class="captcha-error" id="captchaError"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════════════
   Share Page — Tree browser with selection & preview
   ═══════════════════════════════════════════════════ */
const SHARE_DATA = <!--SHARE_DATA-->;
const SETTINGS = <!--SETTINGS_DATA-->;

let allFiles = [];           // flat file array from server
let treeRoot = null;         // built tree
let currentPath = [];        // current breadcrumb path (directory names)
let selectedNames = [];      // flat names of currently selected items
let verified = false;
let isLoading = false;

/* ── Preview config — populated from SETTINGS ── */
var PREVIEW_EXTENSIONS = null;
var KKFILEVIEW_URL = '';
var PREVIEW_MODE = 'system';  // 'system' or 'custom'

function initPreviewConfig() {
  var raw = (SETTINGS.previewExtensions || '').trim();
  if (!raw) {
    PREVIEW_EXTENSIONS = null; // allow all
  } else {
    PREVIEW_EXTENSIONS = raw.split(',').map(function(s){ return s.trim().toLowerCase(); }).filter(Boolean);
  }
  KKFILEVIEW_URL = (SETTINGS.kkfileviewUrl || '').trim().replace(/\/+$/, '');
  PREVIEW_MODE = SETTINGS.previewMode || 'system';
}

function shouldShowPreview(ext) {
  ext = ext.toLowerCase();
  if (PREVIEW_EXTENSIONS === null || PREVIEW_EXTENSIONS.length === 0) return true;
  return PREVIEW_EXTENSIONS.indexOf(ext) >= 0;
}

/* ── Captcha state ── */
var captchaKey = '';
var captchaVerified = false;
var captchaPendingAction = null; // 'extract' or 'download' or 'singleDl'
var captchaPendingDlUrl = null;
var captchaEnabled = SETTINGS.captchaEnabled !== 'false';
var captchaOnExtract = SETTINGS.captchaOnExtract !== 'false';
var captchaOnDownload = SETTINGS.captchaOnDownload !== 'false';

document.addEventListener('DOMContentLoaded', initPage);

function initPage() {
  // Check if share has error (expired / deleted)
  if (SHARE_DATA.error) {
    document.getElementById('siteName').textContent = '📁 ' + (SETTINGS.siteName || '文件分享');
    document.getElementById('siteName').style.display = 'block';
    document.getElementById('errorMessage').querySelector('.error-icon').textContent = SHARE_DATA.errorIcon || '⚠️';
    document.getElementById('errorText').textContent = SHARE_DATA.errorMsg || '分享不可用';
    document.getElementById('errorMessage').style.display = 'block';
    if (SETTINGS.footer) {
      document.getElementById('shareFooter').innerHTML = renderMd(SETTINGS.footer);
      document.getElementById('shareFooter').style.display = 'block';
    }
    return;
  }
  initPreviewConfig();
  // Background
  if (SETTINGS.backgroundImage) {
    document.getElementById('pageBg').style.backgroundImage = 'url(' + SETTINGS.backgroundImage + ')';
    document.body.classList.add('has-bg');
  }
  if (SETTINGS.siteName) {
    document.getElementById('siteName').textContent = '📁 ' + SETTINGS.siteName;
    document.title = SETTINGS.siteName + ' - 文件分享';
  }
  if (SHARE_DATA.topHint) {
    document.getElementById('topHint').innerHTML = renderMd(SHARE_DATA.topHint);
    document.getElementById('topHint').style.display = 'block';
  }
  if (SETTINGS.announcement) {
    document.getElementById('announcementBox').innerHTML = renderMd(SETTINGS.announcement);
    document.getElementById('announcementBox').style.display = 'block';
  }
  if (SETTINGS.footer) {
    document.getElementById('shareFooter').textContent = SETTINGS.footer;
  }

  // Auto-fill extract code from URL hash
  const hashCode = window.location.hash.replace(/^#/, '');
  if (hashCode) {
    const input = document.getElementById('extractCodeInput');
    if (input) {
      input.value = decodeURIComponent(hashCode);
      setTimeout(function() { verifyCode(); }, 100);
    }
  }

  if (SHARE_DATA.hasExtractCode) {
    document.getElementById('codeSection').style.display = 'block';
    document.getElementById('extractCodeInput').focus();
  } else {
    doVerify(null);
  }
}

/* ── Verification ── */
function verifyCode() {
  var code = document.getElementById('extractCodeInput').value.trim();
  if (!code) {
    document.getElementById('codeError').textContent = '请输入提取码';
    document.getElementById('codeError').style.display = 'block';
    return;
  }
  if (captchaEnabled && captchaOnExtract && !captchaVerified) {
    showCaptcha('extract');
    return;
  }
  doVerify(code);
}

function doVerify(code) {
  showLoading(true);
  var btn = document.getElementById('verifyBtn');
  if (btn) btn.disabled = true;

  fetch('/api/share/' + SHARE_DATA.code + '/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: code })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    showLoading(false);
    if (btn) btn.disabled = false;
    if (data.error) {
      if (data.expired || data.exhausted) {
        document.getElementById('codeSection').innerHTML =
          '<div class="code-box" style="text-align:center">' +
          '<div style="font-size:48px;margin-bottom:10px">😢</div>' +
          '<h2 style="color:#fff">' + (data.expired ? '分享已过期' : '分享已达访问上限') + '</h2>' +
          '<p style="color:rgba(255,255,255,0.5);margin-top:6px;font-size:13px">' + data.error + '</p></div>';
        return;
      }
      document.getElementById('codeError').textContent = data.error;
      document.getElementById('codeError').style.display = 'block';
      return;
    }
    document.getElementById('codeSection').style.display = 'none';
    verified = true;
    allFiles = data.files || [];
    buildTree();
    document.getElementById('contentArea').style.display = 'block';
    navigateTo([]);
    showNotification();
  })
  .catch(function(err) {
    showLoading(false);
    if (btn) btn.disabled = false;
    showToast('网络错误: ' + err.message, 'error');
  });
}

/* ═══════════════════════════════════════════════════
   Tree Building
   ═══════════════════════════════════════════════════ */
function buildTree() {
  treeRoot = { name: '(根)', type: 'dir', children: [], files: [] };
  for (var i = 0; i < allFiles.length; i++) {
    var f = allFiles[i];
    insertIntoTree(treeRoot, f);
  }
}

function insertIntoTree(node, file) {
  var parts = file.name.split('/');
  var current = node;
  for (var i = 0; i < parts.length - 1; i++) {
    var part = parts[i];
    var found = null;
    for (var j = 0; j < current.children.length; j++) {
      if (current.children[j].name === part) {
        found = current.children[j];
        break;
      }
    }
    if (!found) {
      found = { name: part, type: 'dir', children: [], files: [] };
      current.files.push(found);
      current.children.push(found);
    }
    current = found;
  }
  var fileName = parts[parts.length - 1];
  current.files.push(file);
  current.children.push(file);
}

/* ── Navigate to a directory path (array of names) ── */
function navigateTo(pathArr) {
  currentPath = pathArr.slice();
  // Find directory node
  var node = treeRoot;
  for (var i = 0; i < pathArr.length; i++) {
    var found = null;
    for (var j = 0; j < node.children.length; j++) {
      if (node.children[j].name === pathArr[i] && node.children[j].type === 'dir') {
        found = node.children[j];
        break;
      }
    }
    if (!found) break;
    node = found;
  }

  // Clear selections in new view
  selectedNames = [];
  updateSelectionUI();
  renderBreadcrumb(pathArr);
  renderFileList(node);
}

/* ── Breadcrumb ── */
function renderBreadcrumb(pathArr) {
  var el = document.getElementById('breadcrumb');
  // Build path array as single-quoted JS literal (safe inside onclick="...")
  var pathArrStr = '[' + pathArr.map(function(p){ return "'" + escJs(p) + "'"; }).join(',') + ']';
  var html = '<a onclick="navigateTo([])">📁 全部文件</a>';
  for (var i = 0; i < pathArr.length; i++) {
    html += '<span class="sep">/</span>';
    if (i === pathArr.length - 1) {
      html += '<span class="current">' + escHtml(pathArr[i]) + '</span>';
    } else {
      var segArrStr = '[' + pathArr.slice(0, i + 1).map(function(p){ return "'" + escJs(p) + "'"; }).join(',') + ']';
      html += '<a onclick="navigateTo(' + segArrStr + ')">' + escHtml(pathArr[i]) + '</a>';
    }
  }
  el.innerHTML = html;
}

/* ── Render current directory ── */
function renderFileList(node) {
  var el = document.getElementById('fileList');
  var empty = document.getElementById('emptyState');
  el.innerHTML = '';

  var children = node.children || [];

  // Sort: dirs first, then alpha
  var dirs = [];
  var files = [];
  for (var i = 0; i < children.length; i++) {
    var c = children[i];
    if (c.type === 'dir') dirs.push(c);
    else files.push(c);
  }
  dirs.sort(function(a,b) { return (a.name||'').localeCompare(b.name||''); });
  files.sort(function(a,b) { return (a.name||'').localeCompare(b.name||''); });

  var allItems = dirs.concat(files);

  if (allItems.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    updateSelectionUI();
    return;
  }
  empty.style.display = 'none';

  // Select-all row
  var allSelected = allItems.length > 0 && allItems.every(function(c) {
    return selectedNames.indexOf(c.name) >= 0;
  });
  el.innerHTML +=
    '<div class="check-all-row" onclick="toggleSelectAll()">' +
    '<div class="cb' + (allSelected ? ' checked' : '') + '" id="selectAllCb">' + (allSelected ? '✓' : '') + '</div>' +
    '<span>全选 ' + allItems.length + ' 项</span></div>';

  // Each item
  for (var i = 0; i < allItems.length; i++) {
    var c = allItems[i];
    var isDir = c.type === 'dir';
    var ext = isDir ? '' : getExt(c.name);
    var icon = isDir ? '📁' : getIcon(ext);
    var isSelected = selectedNames.indexOf(c.name) >= 0;

    var sizeStr = '';
    if (!isDir) {
      sizeStr = c.sizeFormatted || fmtSize(c.size);
    }

    // No action buttons needed — clicking the row handles preview or selection

    // Folders: click row → navigate in; click checkbox → toggle select
    // Files (previewable): click row → preview; click checkbox → toggle select
    // Files (not previewable): click row or checkbox → toggle select
    var showPreview = !isDir && shouldShowPreview(ext);

    // Build path array as single-quoted JS literal (safe inside onclick="...")
    var pathParts = currentPath.concat([c.name]);
    var pathArrStr = '[' + pathParts.map(function(p){ return "'" + escJs(p) + "'"; }).join(',') + ']';

    var rowClick = isDir
      ? 'navigateTo(' + pathArrStr + ')'
      : showPreview
        ? 'previewFile(\'' + escJs(c.name) + '\')'
        : 'toggleSelect(\'' + escJs(c.name) + '\', this)';

    el.innerHTML +=
      '<div class="file-row' + (isSelected ? ' selected' : '') + '" onclick="' + rowClick + '">' +
      '<div class="cb' + (isSelected ? ' checked' : '') + '" id="cb_' + i + '" onclick="event.stopPropagation();toggleSelect(\'' + escJs(c.name) + '\', this.parentElement)">' + (isSelected ? '✓' : '') + '</div>' +
      '<span class="icon">' + icon + '</span>' +
      '<span class="name">' + escHtml(c.name) + '</span>' +
      '<span class="meta">' + sizeStr + '</span>' +
      (isDir ? '' : '') +
      '</div>';
  }

  updateSelectionUI();
}

/* ═══════════════════════════════════════════════════
   Selection
   ═══════════════════════════════════════════════════ */
function toggleSelect(name, row) {
  var idx = selectedNames.indexOf(name);
  if (idx >= 0) {
    selectedNames.splice(idx, 1);
  } else {
    selectedNames.push(name);
  }
  // Update row visual state immediately
  if (row) {
    var isSel = selectedNames.indexOf(name) >= 0;
    row.classList.toggle('selected', isSel);
    var cb = row.querySelector('.cb');
    if (cb) {
      cb.classList.toggle('checked', isSel);
      cb.textContent = isSel ? '✓' : '';
    }
  }
  updateSelectionUI();
}

function toggleSelectAll() {
  // Get current items
  var children = getCurrentChildren();
  var allSelected = children.length > 0 && children.every(function(c) {
    return selectedNames.indexOf(c.name) >= 0;
  });

  if (allSelected) {
    // Deselect all
    for (var i = 0; i < children.length; i++) {
      var idx = selectedNames.indexOf(children[i].name);
      if (idx >= 0) selectedNames.splice(idx, 1);
    }
  } else {
    // Select all
    for (var i = 0; i < children.length; i++) {
      if (selectedNames.indexOf(children[i].name) < 0) {
        selectedNames.push(children[i].name);
      }
    }
  }
  updateSelectionUI();
  // Re-render current view to reflect checkbox states
  rerenderCurrent();
}

function getCurrentChildren() {
  var node = getCurrentNode();
  return node ? (node.children || []) : [];
}

function getCurrentNode() {
  var node = treeRoot;
  for (var i = 0; i < currentPath.length; i++) {
    var found = null;
    for (var j = 0; j < node.children.length; j++) {
      if (node.children[j].name === currentPath[i] && node.children[j].type === 'dir') {
        found = node.children[j];
        break;
      }
    }
    if (!found) return null;
    node = found;
  }
  return node;
}

function updateSelectionUI() {
  var el = document.getElementById('selCountRow');
  el.textContent = '已选择 ' + selectedNames.length + ' 项';
}

function rerenderCurrent() {
  var node = getCurrentNode();
  if (node) renderFileList(node);
}

/* ═══════════════════════════════════════════════════
   Download
   ═══════════════════════════════════════════════════ */
function downloadSelected() {
  if (selectedNames.length === 0) { showToast('请选择文件或文件夹', 'warning'); return; }

  if (captchaEnabled && captchaOnDownload && !captchaVerified) {
    showCaptcha('download');
    return;
  }
  doDownload();
}

function downloadSingleFile(downloadUrl) {
  if (captchaEnabled && captchaOnDownload && !captchaVerified) {
    captchaPendingDlUrl = downloadUrl;
    showCaptcha('singleDl');
    return;
  }
  window.location.href = downloadUrl;
}

function doDownload() {
  // Collect all files matching selected names
  var toDownload = [];
  for (var i = 0; i < selectedNames.length; i++) {
    collectSelected(allFiles, selectedNames[i], toDownload);
  }

  if (toDownload.length === 0) {
    showToast('没有可用的文件', 'error');
    return;
  }

  if (toDownload.length === 1) {
    // Single file → direct download
    window.location.href = toDownload[0].downloadUrl;
    return;
  }

  // Multiple → ZIP
  downloadZip(toDownload);
}

function collectSelected(fileList, name, result) {
  for (var i = 0; i < fileList.length; i++) {
    if (fileList[i].name === name) {
      result.push(fileList[i]);
      return;
    }
  }
  // Not found in flat list — check if it's a folder
  // Get the current node children to find folder
  var node = getCurrentNode();
  if (!node) return;
  for (var i = 0; i < node.children.length; i++) {
    if (node.children[i].name === name && node.children[i].type === 'dir') {
      // Recursively collect all children
      collectDirRecursive(node.children[i], result);
      return;
    }
  }
}

function collectDirRecursive(dirNode, result) {
  for (var i = 0; i < dirNode.children.length; i++) {
    var c = dirNode.children[i];
    if (c.type === 'dir') {
      collectDirRecursive(c, result);
    } else if (c.path) {
      result.push(c);
    }
  }
}

var zipDownloadUrl = null;
var progressTimer = null;
var downloadXhr = null;

function downloadZip(files) {
  var names = files.map(function(f) { return f.name; });
  var totalFiles = files.length;

  var overlay = document.getElementById('progressOverlay');
  var bar = document.getElementById('progressBar');
  var title = document.getElementById('progressTitle');
  var sub = document.getElementById('progressSub');
  var speedEl = document.getElementById('progressSpeed');
  var timeEl = document.getElementById('progressTime');
  var tip = document.getElementById('progressTip');

  bar.classList.remove('indeterminate');
  bar.style.width = '0%';
  bar.style.transform = 'translateX(0)';
  title.textContent = '📦 正在打包 ' + totalFiles + ' 个文件...';
  sub.textContent = '';
  speedEl.textContent = '⏳ 准备中';
  timeEl.textContent = '';
  tip.textContent = '正在打包压缩...';
  overlay.classList.add('show');

  var startTime = Date.now();
  var lastBytes = 0;
  var lastTime = startTime;
  var estimatedTotal = 0;
  var hasEstimate = false;

  // Update time + ETA display every second
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(function() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    if (hasEstimate && lastBytes > 0) {
      var speed = lastBytes / Math.max(1, elapsed);
      if (speed > 0) {
        var remaining = Math.max(0, (estimatedTotal - lastBytes) / speed);
        timeEl.textContent = '已用时 ' + fmtDuration(elapsed) + ' · 预计剩余 ' + fmtDuration(Math.round(remaining));
        return;
      }
    }
    timeEl.textContent = '已用时 ' + fmtDuration(elapsed);
  }, 500);

  var xhr = new XMLHttpRequest();
  downloadXhr = xhr;
  xhr.open('POST', '/api/share/' + SHARE_DATA.code + '/download-batch');
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.responseType = 'blob';

  xhr.onprogress = function(e) {
    var now = Date.now();
    var loaded = e.loaded || 0;
    var dt = (now - lastTime) / 1000;
    if (dt < 0.3 && loaded > 0) return;

    // Get estimated total from response headers (first progress event)
    if (!hasEstimate && xhr.getResponseHeader) {
      var rawHeader = xhr.getResponseHeader('X-Total-Raw-Size');
      if (rawHeader) {
        var rawSize = parseInt(rawHeader) || 0;
        // Use raw size: progress = received / rawSize. Bar reaches ~70-90% then jumps to 100%
        estimatedTotal = rawSize;
        hasEstimate = true;
        bar.classList.remove('indeterminate');
        tip.textContent = fmtSize(rawSize) + ' 预估';
      }
    }

    // Simulate progress based on received bytes vs raw total
    if (hasEstimate && estimatedTotal > 0) {
      var pct = Math.min(99, Math.round(loaded / estimatedTotal * 100));
      bar.style.width = pct + '%';
      sub.textContent = pct + '%';
    } else {
      if (!bar.classList.contains('indeterminate')) bar.classList.add('indeterminate');
    }

    // Speed
    if (loaded > lastBytes && dt > 0) {
      var speed = (loaded - lastBytes) / dt;
      speedEl.textContent = '⬇ ' + fmtSpeed(speed);
      if (hasEstimate && estimatedTotal > 0 && speed > 0) {
        tip.textContent = '已收到 ' + fmtSize(loaded) + ' / ' + fmtSize(estimatedTotal);
      } else {
        tip.textContent = '已收到 ' + fmtSize(loaded);
      }
    }

    lastBytes = loaded;
    lastTime = now;
  };

  xhr.onload = function() {
    clearInterval(progressTimer);
    if (xhr.status !== 200) {
      overlay.classList.remove('show');
      downloadXhr = null;
      new Response(xhr.response).text().then(function(text) {
        try {
          var err = JSON.parse(text);
          showToast(err.error || '请求失败 (' + xhr.status + ')', 'error');
        } catch(e) {
          showToast('请求失败 (' + xhr.status + ')', 'error');
        }
      });
      return;
    }
    bar.classList.remove('indeterminate');
    bar.style.width = '100%';
    sub.textContent = '100%';
    speedEl.textContent = '✅ 完成 ' + fmtSize(xhr.response.size);
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    timeEl.textContent = '总用时 ' + fmtDuration(elapsed);
    tip.textContent = '保存中...';

    setTimeout(function() {
      var blob = xhr.response;
      downloadXhr = null;
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '下载_' + SHARE_DATA.code + '.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); hideProgress(); }, 500);
    }, 300);
  };

  xhr.onerror = function() {
    clearInterval(progressTimer);
    hideProgress();
    downloadXhr = null;
    showToast('下载失败', 'error');
  };

  xhr.onabort = function() {
    clearInterval(progressTimer);
    hideProgress();
    downloadXhr = null;
  };

  xhr.send(JSON.stringify({ files: names }));
}

/* ── Progress ── */
function hideProgress() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  document.getElementById('progressOverlay').classList.remove('show');
}

function cancelDownload() {
  if (downloadXhr) {
    downloadXhr.abort();
    downloadXhr = null;
  }
  hideProgress();
}

/* ── Format helpers ── */
function fmtSpeed(bytesPerSec) {
  if (bytesPerSec < 1024) return Math.round(bytesPerSec) + ' B/s';
  if (bytesPerSec < 1048576) return (bytesPerSec / 1024).toFixed(1) + ' KB/s';
  return (bytesPerSec / 1048576).toFixed(1) + ' MB/s';
}

function fmtDuration(seconds) {
  if (seconds < 0) return '计算中...';
  if (seconds < 60) return seconds + '秒';
  var m = Math.floor(seconds / 60);
  var s = seconds % 60;
  return m + '分' + (s > 0 ? s + '秒' : '');
}

/* ═══════════════════════════════════════════════════
   Captcha
   ═══════════════════════════════════════════════════ */
function showCaptcha(action) {
  captchaPendingAction = action;
  captchaVerified = false;
  document.getElementById('captchaOverlay').classList.add('show');
  document.getElementById('captchaInput').value = '';
  document.getElementById('captchaError').textContent = '';
  setTimeout(function() { document.getElementById('captchaInput').focus(); }, 200);
  loadCaptcha();
}

function closeCaptcha() {
  document.getElementById('captchaOverlay').classList.remove('show');
  captchaPendingAction = null;
}

function loadCaptcha() {
  fetch('/api/captcha/generate')
    .then(function(r){ return r.json() })
    .then(function(data) {
      if (data.error) {
        document.getElementById('captchaError').textContent = data.error;
        return;
      }
      captchaKey = data.key;
      var wrap = document.getElementById('captchaImageWrap');
      wrap.innerHTML = data.svg;
      document.getElementById('captchaInput').value = '';
      document.getElementById('captchaInput').focus();
    })
    .catch(function() {
      document.getElementById('captchaError').textContent = '验证码加载失败';
    });
}

function submitCaptcha() {
  var answer = document.getElementById('captchaInput').value.trim();
  if (!answer) {
    document.getElementById('captchaError').textContent = '请输入验证码';
    return;
  }

  var btn = document.getElementById('captchaSubmitBtn');
  btn.classList.add('loading');
  btn.textContent = '⏳';
  document.getElementById('captchaError').textContent = '';

  fetch('/api/captcha/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: captchaKey, answer: answer })
  })
  .then(function(r){ return r.json() })
  .then(function(data) {
    btn.classList.remove('loading');
    btn.textContent = '✓ 确认';
    if (data.success) {
      captchaVerified = true;
      document.getElementById('captchaOverlay').classList.remove('show');
      // Execute pending action
      var action = captchaPendingAction;
      captchaPendingAction = null;
      if (action === 'extract') {
        doVerify(document.getElementById('extractCodeInput').value.trim());
      } else if (action === 'download') {
        doDownload();
      } else if (action === 'singleDl') {
        var dlUrl = captchaPendingDlUrl;
        captchaPendingDlUrl = null;
        if (dlUrl) window.location.href = dlUrl;
      }
    } else {
      document.getElementById('captchaError').textContent = data.error || '验证码错误';
      setTimeout(loadCaptcha, 600);
    }
  })
  .catch(function() {
    btn.classList.remove('loading');
    btn.textContent = '✓ 确认';
    document.getElementById('captchaError').textContent = '请求失败，请重试';
  });
}

/* ═══════════════════════════════════════════════════
   Preview
   ═══════════════════════════════════════════════════ */
function previewFile(name) {
  var ext = getExt(name).toLowerCase();
  var file = null;
  for (var i = 0; i < allFiles.length; i++) {
    if (allFiles[i].name === name) {
      file = allFiles[i];
      break;
    }
  }
  if (!file) { showToast('文件不存在', 'error'); return; }

  var overlay = document.getElementById('previewOverlay');
  var title = document.getElementById('previewTitle');
  var body = document.getElementById('previewBody');
  var textEl = document.getElementById('previewContent');
  var mdEl = document.getElementById('previewMd');
  var imgEl = document.getElementById('previewImage');
  var vidEl = document.getElementById('previewVideo');

  // Hide all
  textEl.style.display = 'none';
  mdEl.style.display = 'none';
  imgEl.style.display = 'none';
  vidEl.style.display = 'none';

  title.textContent = name;

  // Check if extension is allowed for preview
  var canPreview = (PREVIEW_EXTENSIONS === null || PREVIEW_EXTENSIONS.length === 0) || PREVIEW_EXTENSIONS.indexOf(ext) >= 0;
  if (!canPreview) {
    showToast('该文件类型不支持在线预览', 'warning');
    return;
  }

  // Preview mode: custom (KKFileView) or system (built-in)
  if (PREVIEW_MODE === 'custom' && KKFILEVIEW_URL) {
    var kkUrl = KKFILEVIEW_URL + '/onlinePreview?url=' + btoa(file.downloadUrl);
    title.textContent = name + ' (KKFileView)';
    textEl.style.display = 'block';
    textEl.innerHTML = '<iframe src="' + escHtml(kkUrl) + '" style="width:100%;height:80vh;border:none;border-radius:8px"></iframe>';
    overlay.classList.add('show');
    return;
  }

  // ═══ System Preview ═══
  var isImage = ['.jpg','.jpeg','.png','.gif','.bmp','.webp','.svg','.ico','.tiff','.tif','.avif','.heic','.heif'].indexOf(ext) >= 0;
  var isVideo = ['.mp4','.webm','.ogg','.mov','.avi','.mkv','.flv','.wmv','.3gp','.m4v'].indexOf(ext) >= 0;
  var isAudio = ['.mp3','.wav','.ogg','.aac','.flac','.m4a','.wma'].indexOf(ext) >= 0;
  var isMd = ['.md','.markdown'].indexOf(ext) >= 0;
  var isHtml = ['.html','.htm'].indexOf(ext) >= 0;
  var isDoc = ['.pdf','.doc','.docx','.xls','.xlsx','.ppt','.pptx',
    '.wps','.wpt','.et','.dps','.dpt','.rtf','.epub','.mobi',
    '.odt','.ods','.odp'].indexOf(ext) >= 0;
  var isCode = ['.txt','.log','.csv','.gitignore','.editorconfig',
    '.js','.ts','.mjs','.cjs','.jsx','.tsx','.vue','.svelte','.astro',
    '.py','.java','.c','.cpp','.cc','.cxx','.h','.hpp','.cs','.go','.rs',
    '.rb','.php','.swift','.kt','.scala','.pl','.pm','.lua','.r','.m',
    '.sh','.bash','.zsh','.ps1','.bat','.cmd',
    '.css','.scss','.sass','.less','.styl',
    '.sql','.xml','.json','.yaml','.yml','.toml',
    '.ini','.cfg','.conf','.env','.dockerfile','.makefile',
    '.gradle','.cmake', '.dart', '.ex', '.exs'].indexOf(ext) >= 0;

  if (isImage) {
    imgEl.style.display = 'block';
    imgEl.src = file.previewUrl;
  } else if (isVideo) {
    vidEl.style.display = 'block';
    vidEl.src = file.previewUrl;
    vidEl.load();
  } else if (isAudio) {
    textEl.style.display = 'block';
    textEl.innerHTML = '<div style="padding:20px;text-align:center">' +
      '<div style="font-size:48px;margin-bottom:12px">🎵</div>' +
      '<audio controls autoplay style="width:100%;max-width:400px">' +
      '<source src="' + escHtml(file.previewUrl) + '">' +
      '</audio></div>';
  } else if (isMd) {
    mdEl.style.display = 'block';
    mdEl.innerHTML = '<p style="color:#a0aec0">加载中...</p>';
    fetchText(file, function(content) {
      if (content) {
        mdEl.innerHTML = renderMd(content);
      } else {
        mdEl.innerHTML = '<p style="color:#fc8181">无法加载文件内容</p>';
      }
    });
  } else if (isCode || isHtml) {
    // Code / HTML files → syntax-highlighted display
    textEl.style.display = 'block';
    textEl.innerHTML = '<pre class="code-preview"><code class="lang-' + ext.replace('.','') + '"><span style="color:#a0aec0">加载中...</span></code></pre>';
    fetchText(file, function(content) {
      if (content) {
        textEl.innerHTML = '<pre class="code-preview"><code class="lang-' + ext.replace('.','') + '">' + escHtml(content) + '</code></pre>';
      } else {
        textEl.innerHTML = '<p style="color:#fc8181;padding:20px">无法加载文件内容</p>';
      }
    });
  } else if (isDoc) {
    // Document / binary files — not renderable in system preview
    textEl.style.display = 'block';
    var docMsg = '<div style="padding:20px;text-align:center">' +
      '<div style="font-size:48px;margin-bottom:12px">📄</div>' +
      '<p style="font-size:15px;color:#2d3748;margin:0 0 8px">系统预览不支持此文件类型</p>' +
      '<p style="font-size:13px;color:#718096;margin:0 0 16px">请在管理后台切换预览模式为「自定义预览」并配置 KKFileView 地址<br>或直接下载文件查看</p>' +
      '<button onclick="downloadSingleFile(this.dataset.dlurl)" data-dlurl="' + file.downloadUrl + '" style="display:inline-block;padding:8px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;font-size:13px;font-weight:600;cursor:pointer">⬇ 下载文件</button>' +
      '</div>';
    textEl.innerHTML = docMsg;
  } else {
    // Unknown type — try text fallback; if server rejects, show unsupported
    textEl.style.display = 'block';
    textEl.innerHTML = '<pre class="code-preview"><code class="lang-' + ext.replace('.','') + '"><span style="color:#a0aec0">加载中...</span></code></pre>';
    fetchText(file, function(content) {
      if (content) {
        textEl.innerHTML = '<pre class="code-preview"><code class="lang-' + ext.replace('.','') + '">' + escHtml(content) + '</code></pre>';
      } else {
        textEl.innerHTML = '<div style="padding:20px;text-align:center">' +
          '<div style="font-size:48px;margin-bottom:12px">📦</div>' +
          '<p style="font-size:15px;color:#2d3748;margin:0 0 8px">系统预览不支持此文件格式</p>' +
          '<p style="font-size:13px;color:#718096;margin:0 0 16px">请下载后使用本地程序打开</p>' +
          '<button onclick="downloadSingleFile(this.dataset.dlurl)" data-dlurl="' + file.downloadUrl + '" style="display:inline-block;padding:8px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;font-size:13px;font-weight:600;cursor:pointer">⬇ 下载文件</button>' +
          '</div>';
      }
    });
  }

  overlay.classList.add('show');
}

function fetchText(file, callback) {
  var encoded = encodeURIComponent(file.name);
  fetch('/api/share/' + SHARE_DATA.code + '/text?file=' + encoded)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      callback(data.content || '');
    })
    .catch(function() { callback(null); });
}

function closePreview() {
  var overlay = document.getElementById('previewOverlay');
  overlay.classList.remove('show');
  // Stop video
  var vid = document.getElementById('previewVideo');
  vid.pause();
  vid.src = '';
}

/* ═══════════════════════════════════════════════════
   Helpers
   ═══════════════════════════════════════════════════ */
function getExt(name) {
  var i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i) : '';
}

function getFileType(ext) {
  ext = ext.toLowerCase();
  if (['.jpg','.jpeg','.png','.gif','.bmp','.webp','.svg','.ico'].indexOf(ext) >= 0) return 'image';
  if (['.mp4','.webm','.ogg','.mov','.avi','.mkv','.flv','.wmv'].indexOf(ext) >= 0) return 'video';
  if (['.mp3','.wav','.ogg','.aac','.flac','.m4a','.wma'].indexOf(ext) >= 0) return 'audio';
  if (['.doc','.docx','.ppt','.pptx','.xls','.xlsx','.pdf','.wps','.wpt','.et','.ett','.dps','.dpt'].indexOf(ext) >= 0) return 'office';
  return 'other';
}

function getIcon(ext) {
  ext = ext.toLowerCase();
  var imgExts = ['.jpg','.jpeg','.png','.gif','.bmp','.webp','.svg'];
  var vidExts = ['.mp4','.webm','.mov','.avi','.mkv','.flv'];
  var audExts = ['.mp3','.wav','.ogg','.aac','.flac','.m4a'];
  var pdfExts = ['.pdf'];
  var zipExts = ['.zip','.rar','.7z','.tar','.gz'];
  var codeExts = ['.js','.jsx','.ts','.tsx','.py','.java','.go','.rb','.rs','.php','.c','.cpp','.h','.hpp','.css','.html'];
  var txtExts = ['.txt','.md','.json','.xml','.yaml','.yml','.csv','.log'];
  var docExts = ['.doc','.docx','.wps','.wpt','.xls','.xlsx','.et','.ett','.ppt','.pptx','.dps','.dpt'];
  if (imgExts.indexOf(ext) >= 0) return '🖼️';
  if (vidExts.indexOf(ext) >= 0) return '🎬';
  if (audExts.indexOf(ext) >= 0) return '🎵';
  if (pdfExts.indexOf(ext) >= 0) return '📕';
  if (zipExts.indexOf(ext) >= 0) return '🗜️';
  if (codeExts.indexOf(ext) >= 0) return '💻';
  if (txtExts.indexOf(ext) >= 0) return '📃';
  if (docExts.indexOf(ext) >= 0) return '📄';
  return '📄';
}

function fmtSize(bytes) {
  if (!bytes || bytes === 0) return '-';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escJs(s) {
  if (!s) return '';
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n');
}

/* ── Show/hide loading ── */
function showLoading(show) {
  var el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.className = 'loading-overlay';
    el.innerHTML = '<div class="spinner"></div><span style="color:#fff;font-size:14px">加载中...</span>';
    document.body.appendChild(el);
  }
  el.classList.toggle('show', show);
}

/* ── Minified Markdown renderer ── */
function renderMd(text) {
  if (!text) return '';
  var html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Bold & italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headings
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/^\*\*\*$/gm, '<hr>');
  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, function(m) {
    if (m.match(/^\d+/)) return '<ol>' + m + '</ol>';
    return '<ul>' + m + '</ul>';
  });
  // Line breaks
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  // Cleanup
  var tags = ['ul','ol','h1','h2','h3','h4','blockquote','pre','hr'];
  for (var i = 0; i < tags.length; i++) {
    var t = tags[i];
    html = html.replace(new RegExp('<p>\\s*(<' + t + ')', 'g'), '$1');
    html = html.replace(new RegExp('(</' + t + '>)\\s*</p>', 'g'), '$1');
  }
  return html;
}

/* ── Notification Overlay ── */
var notifyCountdownTimer = null;

function showNotification() {
  if (!SHARE_DATA.showNotification) return;
  var title = SETTINGS.notificationTitle || '';
  var content = SETTINGS.notificationContent || '';
  if (!content) return;

  var overlay = document.getElementById('notifyOverlay');
  var titleEl = document.getElementById('notifyTitle');
  var contentEl = document.getElementById('notifyContent');
  var closeBtn = document.getElementById('notifyCloseBtn');
  var countdownEl = document.getElementById('notifyCountdown');

  titleEl.textContent = title;
  contentEl.innerHTML = renderMd(content);
  closeBtn.classList.remove('active');
  countdownEl.textContent = '';

  var waitTime = parseInt(SETTINGS.notificationWaitTime) || 0;

  if (waitTime > 0) {
    var remaining = waitTime;
    countdownEl.textContent = remaining + ' \u79d2\u540e\u53ef\u5173\u95ed';
    notifyCountdownTimer = setInterval(function() {
      remaining--;
      if (remaining <= 0) {
        clearInterval(notifyCountdownTimer);
        notifyCountdownTimer = null;
        countdownEl.textContent = '';
        closeBtn.classList.add('active');
      } else {
        countdownEl.textContent = remaining + ' \u79d2\u540e\u53ef\u5173\u95ed';
      }
    }, 1000);
  } else {
    closeBtn.classList.add('active');
  }

  overlay.classList.add('show');
}

function hideNotification() {
  var overlay = document.getElementById('notifyOverlay');
  overlay.classList.remove('show');
  if (notifyCountdownTimer) {
    clearInterval(notifyCountdownTimer);
    notifyCountdownTimer = null;
  }
}

// Wire up notification close button
document.addEventListener('DOMContentLoaded', function() {
  var closeBtn = document.getElementById('notifyCloseBtn');
  if (closeBtn) closeBtn.addEventListener('click', hideNotification);
});

/* ── Toast ── */
function showToast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

// Capture keyboard shortcut for global closing
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('previewOverlay').classList.contains('show')) {
      closePreview();
    }
  }
});
